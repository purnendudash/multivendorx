name: Dynamic RestAPI Documentation Creation

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Select plugin"
        required: true
        type: choice
        default: multivendorx
        options:
          - multivendorx
          - moowoodle
          - catalogx
          - notifima

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read Runtime Versions
        id: versions
        shell: bash
        run: |
          ROOT_PACKAGE=./package.json

          NODE_VERSION=$(node -p "
            const pkg=require('${ROOT_PACKAGE}');
            (pkg.engines?.node || pkg.volta?.node || '24').replace(/[^\d.]/g,'')
          ")

          PNPM_VERSION=$(node -p "
            const pkg=require('${ROOT_PACKAGE}');
            (pkg.packageManager?.match(/pnpm@(.*)/)?.[1] || '10')
          ")

          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "pnpm_version=$PNPM_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node_version }}

      - name: Setup PNPM
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@${{ steps.versions.outputs.pnpm_version }} --activate
          echo "$(dirname "$(which pnpm)")" >> $GITHUB_PATH

      - name: Setup PHP Environment
        shell: bash
        run: |
          sudo add-apt-repository ppa:ondrej/php -y
          sudo apt-get update
          sudo apt-get install -y \
            php8.4 \
            php8.4-cli \
            php8.4-mbstring \
            php8.4-xml \
            php8.4-curl \
            unzip \
            curl

      - name: Install Monorepo Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Documentation Packages
        run: |
          pnpm add -Dw \
            widdershins \
            ts-node \
            typescript \
            marked

      - name: Generate OpenAPI Specification
        run: |
          pnpm exec ts-node \
            tools/rest-docs/generate-openapi.ts \
            "${{ github.event.inputs.plugin }}"

      - name: Verify OpenAPI File
        run: |
          ls -la
          cat openapi.json | head -50

      - name: Generate Markdown Documentation
        run: |
          pnpm exec widdershins \
            --search true \
            --language_tabs 'javascript:JavaScript' \
            --language_tabs 'curl:cURL' \
            --language_tabs 'php:PHP' \
            --summary \
            openapi.json \
            -o index.md

      - name: Convert Markdown to HTML
        run: |
          cat > build-docs.js <<'EOF'
          const fs = require('fs');
          const { marked } = require('marked');

          const markdown = fs.readFileSync('index.md', 'utf8');
          const htmlContent = marked.parse(markdown);

          const html = `
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">

            <title>${process.env.PLUGIN_NAME} REST API Documentation</title>

            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                max-width: 1200px;
                margin: 0 auto;
                padding: 40px;
                line-height: 1.7;
                color: #333;
              }

              h1,h2,h3,h4 {
                margin-top: 2rem;
              }

              pre {
                background: #f6f8fa;
                padding: 15px;
                overflow-x: auto;
                border-radius: 6px;
              }

              code {
                background: #f6f8fa;
                padding: 2px 4px;
                border-radius: 3px;
              }

              table {
                width: 100%;
                border-collapse: collapse;
              }

              table th,
              table td {
                border: 1px solid #ddd;
                padding: 8px;
              }

              table th {
                background: #f4f4f4;
              }
            </style>
          </head>
          <body>
            ${htmlContent}
          </body>
          </html>
          `;

          fs.writeFileSync('index.html', html);
          EOF

          PLUGIN_NAME="${{ github.event.inputs.plugin }}" node build-docs.js

      - name: Verify Generated Files
        run: |
          ls -la
          test -f index.html

      - name: Deploy Documentation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_files: index.html
