name: Dynamic RestAPI Documentation Creation

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Select plugin"
        required: true
        type: choice
        default: multivendorx
        options:
          - multivendorx
          - moowoodle
          - catalogx
          - notifima

permissions:
  contents: write
  pages: write       # Required to allow automated deployment to GitHub Pages
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    # Step 1: Install tools directly inside the cloud runner instance
    - name: Install Generation Tools
      run: npm install swagger-autogen widdershins shins

    # Step 2: Use code reflection to scan the selected plugin directory in the cloud
    - name: Run Autogen Script Scan
      run: node .github/scripts/generate-express-openapi.js "${{ github.event.inputs.plugin }}"

    # Step 3: Convert the structural openapi.json file into Slate Markdown
    - name: Transform Spec to Slate Markdown
      run: npx widdershins --search true --language_tabs 'javascript:JavaScript' 'curl:cURL' 'php:PHP' --summary openapi.json -o index.html.md

    # Step 4: Compile Slate Markdown into a 3-column HTML canvas site
    - name: Compile Layout to Static HTML Canvas
      run: npx shins --inline index.html.md -o index.html

    # Step 5: Publish production assets directly to your public github.io site branch
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_files: 'index.html'
